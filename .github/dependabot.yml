version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    ignore:
      # Les majors sont des décisions architecturales (breaking changes) à traiter
      # manuellement — on ne les laisse pas entrer via dependabot auto-groupé.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # Prisma est épinglé EXACTEMENT à 7.8.0 (cf. memory project-prisma-pin,
      # ADR-0009). Le CLI `prisma`, `@prisma/client` et l'adapter `@prisma/adapter-pg`
      # doivent partager la MÊME version (lock du moteur) : un bump dependabot
      # indépendant (groupes prod/dev distincts) provoquerait un mismatch de
      # version → build cassé. On bloque donc tout bump ; les montées de version
      # Prisma se font manuellement et de façon coordonnée sur les trois paquets.
      - dependency-name: prisma
      - dependency-name: '@prisma/client'
      - dependency-name: '@prisma/adapter-pg'
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
