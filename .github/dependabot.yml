version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Paris
    open-pull-requests-limit: 5
    ignore:
      # Les majors sont des décisions architecturales (breaking changes) à traiter
      # manuellement — on ne les laisse pas entrer via dependabot auto-groupé.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # Prisma est épinglé à 6.19.0 (cf. memory project-prisma-pin) : même le patch
      # 6.19.3 embarque un moteur v7 qui rejette `url` dans le datasource et casse
      # le build Docker. On bloque DONC tout bump (major, minor ET patch) tant
      # qu'une vraie migration v7 (prisma.config.ts) n'est pas faite — sinon
      # dependabot rouvre 6.19.3 en boucle (cf. #88/#89).
      - dependency-name: prisma
      - dependency-name: '@prisma/client'
    groups:
      npm-production:
        dependency-type: production
      npm-development:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '05:30'
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - '*'
