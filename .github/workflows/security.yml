name: Security

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]
  schedule:
    - cron: '18 3 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependency-audit:
    name: Runtime dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Block critical runtime vulnerabilities
        run: npm run security:audit

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: detect --source /github/workspace --log-level warn --redact

      - name: Block committed key/certificate files
        # gitleaks ne détecte que du texte reconnaissable — un .p12 est un binaire
        # PKCS12 opaque qui lui échappe (cause de l'incident post-mortem 2026-07-02).
        # Ce garde-fou bloque par extension, indépendamment du contenu.
        run: |
          set -euo pipefail
          matches=$(git ls-files | grep -iE '\.(p12|pfx|key|pem|jks)$' || true)
          if [ -n "$matches" ]; then
            echo "::error::Fichier(s) clé/certificat détecté(s) dans le repo :"
            echo "$matches"
            exit 1
          fi

  container-scan:
    name: Container scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build local image
        run: |
          set -euo pipefail
          docker build \
            -f "${{ matrix.image.dockerfile }}" \
            -t "pouetpouet/${{ matrix.image.name }}:${{ github.sha }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pouetpouet/${{ matrix.image.name }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
