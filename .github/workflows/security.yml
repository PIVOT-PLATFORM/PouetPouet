name: Security

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master, develop]
  schedule:
    - cron: '18 3 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependency-audit:
    name: Runtime dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Block critical runtime vulnerabilities
        run: npm run security:audit

  container-scan:
    name: Container scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build local image
        run: |
          set -euo pipefail
          docker build \
            -f "${{ matrix.image.dockerfile }}" \
            -t "pouetpouet/${{ matrix.image.name }}:${{ github.sha }}" \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: pouetpouet/${{ matrix.image.name }}:${{ github.sha }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL
