name: Mutation Testing

# Stryker — mesure la qualité des tests unitaires de l'API en injectant des
# mutations dans le code source et en vérifiant que les tests les détectent.
# Non bloquant (thresholds.break: null) — run hebdomadaire pour suivre la tendance.
on:
  schedule:
    - cron: '0 2 * * 0'  # dimanche 02:00 UTC
  workflow_dispatch:

permissions: {}

env:
  NODE_VERSION: '22'

jobs:
  stryker-api:
    name: Stryker — API
    runs-on: ubuntu-latest
    # ~19 800 mutants sur src/**/*.ts (20 modules) ; observé ~50-60 min à rythme
    # constant (perTest coverage analysis) — 30 min était systématiquement
    # insuffisant (job annulé à 60% de complétion, jamais de rapport produit).
    timeout-minutes: 90
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run Stryker
        working-directory: apps/api
        run: npx stryker run

      - name: Upload mutation report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: stryker-api-report
          path: apps/api/reports/mutation
          retention-days: 14
