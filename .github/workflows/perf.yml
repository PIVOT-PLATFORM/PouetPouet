name: Performance (Lighthouse)

# Non bloquant par conception : workflow séparé, jamais déclenché sur PR.
# Lancé manuellement (workflow_dispatch) ou chaque lundi (suivi de tendance).
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # lundi 04:00 UTC

permissions: {}

env:
  NODE_VERSION: '22'

jobs:
  lighthouse:
    name: Lighthouse budgets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      # Le build web a besoin des variables publiques ; l'API n'a pas à tourner
      # pour mesurer landing/login/register (rendu sans appel bloquant).
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Web
        working-directory: apps/web
        run: npm run build

      - name: Run Lighthouse CI (budgets)
        run: npx --yes @lhci/cli@0.14.x autorun

      - name: Upload Lighthouse reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: lhci-reports
          retention-days: 7
