name: Release

# Au push sur master : crée le tag git v<version> et la GitHub Release
# correspondante, avec les notes extraites de PATCH_NOTES (patch-notes.ts).
# Idempotent : ne fait rien si le tag de la version courante existe déjà.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag & GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} existe déjà — rien à faire."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        if: steps.tag.outputs.exists == 'false'
        # tsx n'est qu'en devDependency d'apps/api (non hoisté à la racine en CI) :
        # on l'exécute depuis le workspace apps/api, où son binaire est résolu,
        # et on écrit le résultat à la racine du dépôt.
        run: |
          cd apps/api
          npx tsx scripts/format-release-notes.ts "${{ steps.ver.outputs.version }}" > "$GITHUB_WORKSPACE/RELEASE_NOTES.md"

      - name: Create tag & GitHub Release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"
          gh release create "v${{ steps.ver.outputs.version }}" \
            --title "v${{ steps.ver.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
