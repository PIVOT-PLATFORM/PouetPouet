name: Deploy to GCP

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGION: europe-west1
  REPO: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pouetpouet

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-api:
    name: Build & Deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      url: ${{ steps.get-url.outputs.url }}

    steps:
      - uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push API image
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          docker build -f apps/api/Dockerfile \
            -t ${{ env.REPO }}/api:${{ github.sha }} \
            -t ${{ env.REPO }}/api:latest \
            -t ${{ env.REPO }}/api:"$VERSION" \
            .
          docker push ${{ env.REPO }}/api:${{ github.sha }}
          docker push ${{ env.REPO }}/api:latest
          docker push ${{ env.REPO }}/api:"$VERSION"

      - name: Remove legacy SENTRY_DSN secret binding
        run: |
          set -euo pipefail
          gcloud run services update pouetpouet-api \
            --region ${{ env.REGION }} \
            --remove-secrets=SENTRY_DSN || true

      - name: Deploy API to Cloud Run
        run: |
          set -euo pipefail
          # Multi-instance : pilote par des variables de depot (defauts surs = mono-instance).
          # Activer = definir MAX_INSTANCES>1, REDIS_HOST/REDIS_PORT (Memorystore) et
          # VPC_CONNECTOR. Voir docs/ops/scaling-multi-instance.md.
          EXTRA_ARGS=""
          if [ -n "${{ vars.VPC_CONNECTOR }}" ]; then
            EXTRA_ARGS="--vpc-connector=${{ vars.VPC_CONNECTOR }} --vpc-egress=private-ranges-only"
          fi
          gcloud run deploy pouetpouet-api \
            --image ${{ env.REPO }}/api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances=1 \
            --max-instances=${{ vars.MAX_INSTANCES || '1' }} \
            --timeout=3600 \
            --session-affinity \
            $EXTRA_ARGS \
            --add-cloudsql-instances ${{ secrets.GCP_PROJECT_ID }}:${{ env.REGION }}:pouetpouet-db \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --set-secrets JWT_SECRET=JWT_SECRET:latest \
            --set-secrets FRONTEND_URL=FRONTEND_URL:latest \
            --set-secrets SMTP_USER=SMTP_USER:latest \
            --set-secrets SMTP_PASS=SMTP_PASS:latest \
            --set-secrets MAIL_FROM=SMTP_USER:latest \
            --set-env-vars NODE_ENV=production,SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,SMTP_SECURE=false,SENTRY_DSN=${{ secrets.SENTRY_DSN_API }},REDIS_HOST=${{ vars.REDIS_HOST || 'localhost' }},REDIS_PORT=${{ vars.REDIS_PORT || '6379' }},ADMIN_EMAILS=${{ vars.ADMIN_EMAILS || 'julien-muguet@orange.fr' }}

      - name: Get API URL
        id: get-url
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe pouetpouet-api \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Smoke test API
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "${{ steps.get-url.outputs.url }}/health"

  deploy-web:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    needs: deploy-api

    steps:
      - uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push Web image
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          docker build -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ needs.deploy-api.outputs.url }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ needs.deploy-api.outputs.url }} \
            --build-arg NEXT_PUBLIC_SENTRY_DSN=${{ secrets.SENTRY_DSN_WEB }} \
            -t ${{ env.REPO }}/web:${{ github.sha }} \
            -t ${{ env.REPO }}/web:latest \
            -t ${{ env.REPO }}/web:"$VERSION" \
            .
          docker push ${{ env.REPO }}/web:${{ github.sha }}
          docker push ${{ env.REPO }}/web:latest
          docker push ${{ env.REPO }}/web:"$VERSION"

      - name: Deploy Web to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy pouetpouet-web \
            --image ${{ env.REPO }}/web:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3000

      - name: Get Web URL
        id: get-url
        run: |
          set -euo pipefail
          URL=$(gcloud run services describe pouetpouet-web \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Smoke test Web
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "${{ steps.get-url.outputs.url }}"

  notify-failure:
    name: Notify on deploy failure
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    if: failure()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          set -euo pipefail
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚨 Déploiement PouetPouet en échec sur master (${{ github.sha }}). $RUN_URL\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Fallback log
        if: env.SLACK_WEBHOOK_URL == ''
        run: echo "Déploiement en échec. SLACK_WEBHOOK_URL non configuré — voir le run et la révision Cloud Run précédente (runbook docs/ops)."
