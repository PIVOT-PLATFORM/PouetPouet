# SonarQube Cloud / SonarCloud
# Project identity is injected by .github/workflows/ci.yml:
# - sonar.projectKey      <- GitHub variable SONAR_PROJECT_KEY
# - sonar.organization    <- GitHub variable SONAR_ORGANIZATION

sonar.projectName=PouetPouet

sonar.sources=apps,packages
sonar.tests=apps
sonar.test.inclusions=\
  apps/**/*.test.ts,\
  apps/**/*.test.tsx,\
  apps/**/*.spec.ts,\
  apps/**/*.spec.tsx

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/.turbo/**,\
  **/dist/**,\
  **/coverage/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/prisma/migrations/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

sonar.coverage.exclusions=\
  **/*.config.ts,\
  **/*.config.mjs,\
  **/*.d.ts,\
  **/next-env.d.ts,\
  **/instrumentation*.ts,\
  **/prisma/**,\
  apps/web/e2e/**,\
  apps/web/src/app/**/layout.tsx

sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info

sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
