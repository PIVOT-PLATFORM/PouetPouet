services:
  postgres:
    image: postgres:16-alpine
    container_name: pouetpouet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pouetpouet
      POSTGRES_PASSWORD: pouetpouet_dev
      POSTGRES_DB: pouetpouet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pouetpouet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # LLM local pour l'assistant Pouet (opt-in) :
  #   docker compose --profile ollama up -d ollama
  #   docker compose --profile ollama exec ollama ollama pull llama3.2:3b
  ollama:
    image: ollama/ollama:latest
    container_name: pouetpouet_ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # IdP local pour tester le SSO OIDC (opt-in) :
  #   docker compose --profile sso up -d keycloak
  # Realm "forge" importé depuis keycloak/ — utilisateur test : sso-user / sso-password
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: pouetpouet_keycloak
    profiles: ["sso"]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

volumes:
  postgres_data:
  redis_data:
  ollama_data:
