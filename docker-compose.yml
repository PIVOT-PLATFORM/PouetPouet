services:
  postgres:
    image: postgres:16-alpine
    container_name: pouetpouet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pouetpouet
      POSTGRES_PASSWORD: pouetpouet_dev
      POSTGRES_DB: pouetpouet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pouetpouet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Pods mock pour le module Commande publique : simulent les systèmes externes
  # (PGI type SAP, LDAP/OIDC) dont l'app ne fait que consommer la donnée — jamais
  # déployés en prod (PGI_API_URL/LDAP_API_URL y pointent vers les vrais systèmes).
  pgi-mock:
    build:
      context: .
      dockerfile: apps/pgi-mock/Dockerfile
    container_name: pouetpouet_pgi_mock
    restart: unless-stopped
    ports:
      - "4100:4100"

  ldap-mock:
    build:
      context: .
      dockerfile: apps/ldap-mock/Dockerfile
    container_name: pouetpouet_ldap_mock
    restart: unless-stopped
    ports:
      - "4102:4102"

  # IdP local pour tester le SSO OIDC (opt-in) :
  #   docker compose --profile sso up -d keycloak
  # Realm "forge" importé depuis keycloak/ — utilisateur test : sso-user / sso-password
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: pouetpouet_keycloak
    profiles: ["sso"]
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

volumes:
  postgres_data:
  redis_data:
